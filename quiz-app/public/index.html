<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quiz</title>
<style>
  :root { --primary: #6c5ce7; --primary-hover: #5a4bd1; --green: #00b894; --red: #e17055; --bg: #0f0f1a; --card: #1a1a2e; --border: #2d2d44; --text: #e2e8f0; --muted: #8892b0; --accent1: #fd79a8; --accent2: #00cec9; --accent3: #fdcb6e; --accent4: #a29bfe; --glow: rgba(108,92,231,0.3); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 20% 50%, rgba(108,92,231,0.08) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(253,121,168,0.06) 0%, transparent 50%), radial-gradient(circle at 50% 80%, rgba(0,206,201,0.06) 0%, transparent 50%); z-index: -1; animation: bgShift 20s ease-in-out infinite; }
  @keyframes bgShift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-2%,2%); } }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 var(--glow); } 50% { box-shadow: 0 0 20px 4px var(--glow); } }
  .header { background: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8); color: #fff; padding: 20px 0; text-align: center; position: relative; overflow: hidden; }
  .header::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .header h1 { font-size: 26px; font-weight: 800; position: relative; z-index: 1; letter-spacing: -0.5px; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; position: relative; z-index: 1; }
  .container { max-width: 640px; margin: 0 auto; padding: 20px 16px; }
  .tabs { display: flex; background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
  .tab { flex: 1; padding: 12px; text-align: center; font-weight: 600; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--muted); transition: all 0.3s; }
  .tab.active { color: #fff; background: linear-gradient(135deg, var(--primary), var(--accent4)); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; backdrop-filter: blur(10px); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--accent2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; transition: all 0.3s; background: #16162a; color: var(--text); }
  .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--glow); }
  .btn { display: inline-block; padding: 14px 28px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; letter-spacing: 0.3px; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent1)); color: #fff; width: 100%; position: relative; overflow: hidden; }
  .btn-primary::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s; }
  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.4); }
  .btn-primary:disabled { background: #2d2d44; cursor: not-allowed; transform: none; box-shadow: none; }
  .timer-bar { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
  .timer-bar .timer { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; background: linear-gradient(135deg, var(--accent2), var(--accent4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .timer-bar .progress-text { font-size: 13px; color: var(--muted); font-weight: 600; }
  .step-dots { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
  .step-dot { width: 36px; height: 6px; border-radius: 3px; background: var(--border); transition: all 0.4s; }
  .step-dot.active { background: linear-gradient(135deg, var(--primary), var(--accent1)); box-shadow: 0 0 12px var(--glow); }
  .step-dot.done { background: var(--green); }
  .question-card { background: linear-gradient(145deg, var(--card), #1e1e36); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; margin-bottom: 12px; animation: fadeSlideIn 0.35s ease-out; position: relative; overflow: hidden; }
  .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent1), var(--primary), var(--accent2)); }
  .q-number { font-size: 13px; font-weight: 800; background: linear-gradient(135deg, var(--accent3), var(--accent1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .q-text { font-size: 18px; font-weight: 700; line-height: 1.6; margin-bottom: 20px; color: #fff; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 14px; cursor: pointer; transition: all 0.25s; font-size: 15px; background: rgba(255,255,255,0.02); }
  .option:hover { border-color: var(--accent4); background: rgba(162,155,254,0.08); transform: translateX(4px); }
  .option.selected { border-color: var(--green); background: rgba(0,184,148,0.12); animation: popIn 0.25s ease-out; }
  .option-key { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg, #2d2d44, #1a1a2e); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: var(--muted); flex-shrink: 0; transition: all 0.25s; }
  .option.selected .option-key { background: linear-gradient(135deg, var(--green), var(--accent2)); color: #fff; }
  .option:nth-child(1):hover .option-key { background: linear-gradient(135deg, var(--accent1), #e84393); color: #fff; }
  .option:nth-child(2):hover .option-key { background: linear-gradient(135deg, var(--accent2), #0984e3); color: #fff; }
  .option:nth-child(3):hover .option-key { background: linear-gradient(135deg, var(--accent3), #e17055); color: #fff; }
  .option:nth-child(4):hover .option-key { background: linear-gradient(135deg, var(--accent4), var(--primary)); color: #fff; }
  .result-card { text-align: center; padding: 40px 24px; }
  .result-score { font-size: 72px; font-weight: 900; background: linear-gradient(135deg, var(--accent3), var(--accent1), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; animation: popIn 0.5s ease-out; }
  .result-label { font-size: 14px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .result-details { display: flex; justify-content: center; gap: 32px; margin-top: 20px; }
  .result-stat { text-align: center; }
  .result-stat .val { font-size: 24px; font-weight: 800; color: var(--accent2); }
  .result-stat .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent2); font-weight: 700; padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--border); }
  .lb-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-table tr:hover td { background: rgba(108,92,231,0.06); }
  .lb-rank { font-weight: 800; font-size: 18px; }
  .lb-name { font-weight: 700; color: #fff; }
  .lb-email { font-size: 12px; color: var(--muted); }
  .lb-score { font-weight: 800; color: var(--accent3); }
  .lb-empty { text-align: center; padding: 40px; color: var(--muted); }
  .done-card { text-align: center; padding: 40px 24px; }
  .done-card .icon { font-size: 56px; margin-bottom: 12px; }
  .done-card p { color: var(--muted); font-size: 15px; }
  .hidden { display: none; }
  .error { color: var(--accent1); font-size: 13px; margin-top: 8px; }
  .resume-banner { background: rgba(253,203,110,0.1); border: 1px solid var(--accent3); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px; color: var(--accent3); text-align: center; }
  #quizSection { -webkit-user-select: none; user-select: none; }
  .nav-bar { display: flex; gap: 10px; margin-top: 12px; }
  .nav-bar .btn { flex: 1; padding: 12px; font-size: 14px; }
  .btn-secondary { background: var(--border); color: var(--text); border-radius: 12px; }
  .btn-secondary:hover { background: #3d3d5c; transform: translateY(-1px); }
  .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .lb-period { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .lb-period:hover { border-color: var(--accent4); color: var(--text); }
  .lb-period.active { background: linear-gradient(135deg, var(--primary), var(--accent4)); color: #fff; border-color: transparent; }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 Daily Quiz</h1>
  <p id="dateDisplay"></p>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('quiz')">Take Quiz</button>
    <button class="tab" onclick="showTab('leaderboard')">Leaderboard</button>
  </div>

  <!-- LOGIN -->
  <div id="loginSection">
    <div class="card">
      <h2 style="margin-bottom:4px">Ready to play?</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:18px">5 random questions · timed · one attempt per day</p>
      <div class="form-group">
        <label>Name</label>
        <input id="nameInput" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="emailInput" type="email" placeholder="john@example.com" />
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
      <p class="error hidden" id="loginError"></p>
    </div>
  </div>

  <!-- ALREADY DONE -->
  <div id="doneSection" class="hidden">
    <div class="card done-card">
      <div class="icon">✅</div>
      <h2>You've already taken today's quiz!</h2>
      <p>Come back tomorrow for a new one.</p>
      <br>
      <button class="btn btn-primary" onclick="showTab('leaderboard')" style="width:auto;padding:10px 24px">View Leaderboard →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quizSection" class="hidden">
    <div id="resumeBanner" class="resume-banner hidden">⚡ Resuming your quiz — timer continues from where you left off</div>
    <div class="timer-bar">
      <div><span class="progress-text" id="progressText">0 / 5 answered</span></div>
      <div class="timer">⏱ <span id="timer">00:00</span></div>
    </div>
    <div class="step-dots" id="stepDots"></div>
    <div id="questions"></div>
    <div class="nav-bar">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQ()" disabled>← Previous</button>
      <button class="btn btn-secondary" id="nextBtn" onclick="nextQ()">Next →</button>
    </div>
    <button class="btn btn-primary" id="submitBtn" onclick="submitQuiz()" style="margin-top:12px">Submit Quiz</button>
  </div>

  <!-- RESULT -->
  <div id="resultSection" class="hidden">
    <div class="card result-card">
      <div class="result-score" id="resultScore"></div>
      <div class="result-label">Score</div>
      <div class="result-details">
        <div class="result-stat"><div class="val" id="resultCorrect"></div><div class="lbl">Correct</div></div>
        <div class="result-stat"><div class="val" id="resultTime"></div><div class="lbl">Time</div></div>
      </div>
      <br>
      <button class="btn btn-primary" onclick="showTab('leaderboard')" style="width:auto;padding:10px 24px">View Leaderboard →</button>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboardSection" class="hidden">
    <div class="card" style="padding:16px">
      <h2 style="margin-bottom:14px">🏆 Leaderboard</h2>
      <div class="lb-periods" style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        <button class="lb-period active" onclick="switchPeriod('daily',this)">Today</button>
        <button class="lb-period" onclick="switchPeriod('weekly',this)">This Week</button>
        <button class="lb-period" onclick="switchPeriod('monthly',this)">This Month</button>
        <button class="lb-period" onclick="switchPeriod('all',this)">All Time</button>
      </div>
      <div id="lbContent"></div>
    </div>
  </div>
</div>

<script>
const SESSION_KEY = 'quiz_session';
let quiz = null, answers = {}, timerInterval = null, serverStartedAt = null, currentQ = 0, allQuestions = [];

// --- Anti copy-paste ---
document.addEventListener('copy', e => { if (document.getElementById('quizSection').contains(e.target)) e.preventDefault(); });
document.addEventListener('contextmenu', e => { if (document.getElementById('quizSection').contains(e.target)) e.preventDefault(); });

const today = new Date().toISOString().slice(0, 10);
document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

// --- Session helpers ---
function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; }
}
function saveSession(data) { sessionStorage.setItem(SESSION_KEY, JSON.stringify(data)); }
function clearSession() { sessionStorage.removeItem(SESSION_KEY); }

// --- View management ---
const views = ['loginSection', 'doneSection', 'quizSection', 'resultSection', 'leaderboardSection'];
function showView(id) { views.forEach(v => document.getElementById(v).classList.toggle('hidden', v !== id)); }

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', (tab === 'quiz' && i === 0) || (tab === 'leaderboard' && i === 1)));
  if (tab === 'leaderboard') { showView('leaderboardSection'); loadLeaderboard(); return; }
  // Quiz tab — figure out which state to show
  const session = getSession();
  if (session && session.submitted) showView('doneSection');
  else if (session && session.questions) showView('quizSection');
  else showView('loginSection');
}

// --- Timer ---
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - new Date(serverStartedAt).getTime()) / 1000);
    document.getElementById('timer').textContent = String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }, 1000);
}

// --- Render questions ---
function renderQuestions(questions, savedAnswers) {
  answers = savedAnswers || {};
  allQuestions = questions;
  currentQ = 0;
  showQuestion();
}

function showQuestion() {
  const q = allQuestions[currentQ], total = allQuestions.length;
  const container = document.getElementById('questions');
  container.innerHTML =
    `<div class="question-card">` +
    `<div class="q-number">⚡ Question ${currentQ + 1} of ${total}</div>` +
    `<div class="q-text">${q.text}</div>` +
    `<div class="options">` +
    Object.entries(q.options).map(([k, v]) =>
      `<div class="option${answers[String(q.id)] === k ? ' selected' : ''}" data-q="${q.id}" data-opt="${k}" onclick="pick(this)">
        <span class="option-key">${k}</span><span>${v}</span>
      </div>`
    ).join('') + `</div></div>`;
  document.getElementById('prevBtn').disabled = currentQ === 0;
  document.getElementById('nextBtn').disabled = currentQ === total - 1;
  document.getElementById('progressText').textContent = `${Object.keys(answers).length} / ${total} answered`;
  // Step dots
  document.getElementById('stepDots').innerHTML = allQuestions.map((qq, i) =>
    `<div class="step-dot${i === currentQ ? ' active' : ''}${answers[String(qq.id)] ? ' done' : ''}" onclick="currentQ=${i};showQuestion()"></div>`
  ).join('');
}

function nextQ() { if (currentQ < allQuestions.length - 1) { currentQ++; showQuestion(); } }
function prevQ() { if (currentQ > 0) { currentQ--; showQuestion(); } }

// --- Start quiz ---
async function startQuiz() {
  const name = document.getElementById('nameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  if (!name || !email) { errEl.textContent = 'Please fill in both fields.'; errEl.classList.remove('hidden'); return; }

  const res = await fetch('/api/start', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email }),
  });
  const data = await res.json();

  if (!res.ok) {
    if (data.error === 'already_submitted') {
      saveSession({ date: today, email, submitted: true });
      showView('doneSection');
    } else {
      errEl.textContent = data.message || data.error; errEl.classList.remove('hidden');
    }
    return;
  }

  quiz = data;
  serverStartedAt = data.startedAt;
  saveSession({ date: today, name, email, questions: data.questions, startedAt: data.startedAt, answers: {} });

  if (data.resumed) document.getElementById('resumeBanner').classList.remove('hidden');
  showView('quizSection');
  renderQuestions(data.questions, {});
  startTimer();
}

// --- Pick answer ---
function pick(el) {
  const qId = el.dataset.q;
  el.closest('.options').querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  answers[qId] = el.dataset.opt;

  const session = getSession();
  if (session) { session.answers = answers; saveSession(session); }

  const total = allQuestions.length;
  document.getElementById('progressText').textContent = `${Object.keys(answers).length} / ${total} answered`;

  // Auto-advance after short delay
  if (currentQ < total - 1) setTimeout(() => { currentQ++; showQuestion(); }, 300);
}

// --- Submit ---
async function submitQuiz() {
  clearInterval(timerInterval);
  const session = getSession();
  if (!session) return;

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Submitting...';

  const res = await fetch('/api/submit', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: session.email, answers, date: today }),
  });
  const data = await res.json();

  saveSession({ date: today, email: session.email, submitted: true });

  if (res.ok) {
    document.getElementById('resultScore').textContent = `${data.score}%`;
    document.getElementById('resultCorrect').textContent = `${data.correct}/${data.total}`;
    const m = Math.floor(data.timeTaken / 60), s = data.timeTaken % 60;
    document.getElementById('resultTime').textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
    showView('resultSection');
  } else {
    if (data.error === 'already_submitted') showView('doneSection');
    else { document.getElementById('resultScore').textContent = '—'; document.getElementById('resultCorrect').textContent = data.error || data.message; showView('resultSection'); }
  }
}

// --- Leaderboard ---
let lbPeriod = 'daily';
function switchPeriod(period, btn) {
  lbPeriod = period;
  document.querySelectorAll('.lb-period').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadLeaderboard();
}

async function loadLeaderboard() {
  const res = await fetch(`/api/leaderboard?period=${lbPeriod}`);
  const lb = await res.json();
  const el = document.getElementById('lbContent');
  if (!lb.length) { el.innerHTML = '<div class="lb-empty">No one has played yet. Be the first!</div>'; return; }
  const medals = ['🥇', '🥈', '🥉'];
  el.innerHTML =
    `<table class="lb-table"><thead><tr><th>#</th><th>Player</th><th>Score</th><th>Played</th></tr></thead><tbody>` +
    lb.map((e, i) =>
      `<tr><td class="lb-rank">${medals[i] || (i + 1)}</td><td><div class="lb-name">${e.name}</div><div class="lb-email">${e.email}</div></td><td class="lb-score">${e.avgScore}%</td><td>${e.quizzesTaken}</td></tr>`
    ).join('') + `</tbody></table>`;
}

// --- Init: check for existing session ---
(function init() {
  const session = getSession();
  if (session && session.date === today) {
    if (session.submitted) {
      showView('doneSection');
    } else if (session.questions) {
      // Resume in-progress quiz
      quiz = session;
      serverStartedAt = session.startedAt;
      document.getElementById('nameInput').value = session.name;
      document.getElementById('emailInput').value = session.email;
      document.getElementById('resumeBanner').classList.remove('hidden');
      showView('quizSection');
      renderQuestions(session.questions, session.answers || {});
      startTimer();
    }
  } else {
    clearSession(); // stale session from a different day
  }
  loadLeaderboard();
})();
</script>
</body>
</html>
